name: deployuj

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ftp-deploy
  cancel-in-progress: false

jobs:
  deploy-ftp:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Skopiuj pliki publiczne do _site/
        run: |
          mkdir -p _site/opisy _site/css _site/js
          cp index.html dostepnosc.html kontakt.html sw.js dane.js count.js _site/
          cp -r css/* _site/css/
          cp -r js/* _site/js/
          cp opisy/*.js _site/opisy/
          cp dataset_*.csv dataset_*.json _site/ 2>/dev/null || true
      - name: Wyślij przez FTP (lh.pl)
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          server-dir: ${{ vars.FTP_SERVER_DIR || './' }}
          local-dir: ./_site/
          protocol: ${{ vars.FTP_PROTOCOL || 'ftps' }}
          security: ${{ vars.FTP_SECURITY || 'strict' }}
          port: ${{ vars.FTP_PORT || '21' }}
          state-name: .ftp-deploy-sync-state.json
          log-level: standard
