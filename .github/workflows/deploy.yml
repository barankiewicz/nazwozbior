name: deployuj

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
      - name: Skopiuj pliki publiczne do _site/
        run: |
          mkdir -p _site/opisy
          cp index.html dostepnosc.html kontakt.html sw.js dane.js count.js _site/
          cp opisy/*.js _site/opisy/
          cp dataset_*.csv dataset_*.json _site/ 2>/dev/null || true
      - name: Deploy na GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
        with:
          path: _site

  deploy-ftp:
    needs: deploy
    if: ${{ vars.FTP_ENABLED == 'true' }}
    runs-on: ubuntu-latest
    concurrency:
      group: ftp-${{ github.ref }}
      cancel-in-progress: false
    steps:
      - uses: actions/checkout@v4
      - name: Skopiuj pliki
        run: |
          mkdir -p _site/opisy
          cp index.html dostepnosc.html kontakt.html sw.js dane.js count.js _site/
          cp opisy/*.js _site/opisy/
          cp dataset_*.csv dataset_*.json _site/ 2>/dev/null || true
      - name: Wyślij przez FTP
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          server-dir: ${{ vars.FTP_SERVER_DIR || './' }}
          local-dir: ./_site/
          protocol: ${{ vars.FTP_PROTOCOL || 'ftps' }}
          security: ${{ vars.FTP_SECURITY || 'strict' }}
          port: ${{ vars.FTP_PORT || '21' }}
          state-name: .ftp-deploy-sync-state.json
          log-level: standard
